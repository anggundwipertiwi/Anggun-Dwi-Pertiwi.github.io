<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1530"/>
      <stop offset="100%" stop-color="#2a1b45"/>
    </linearGradient>
    <linearGradient id="moduleGrad2b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow2b" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dangerGlow2b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="url(#bgGrad2b)"/>
  <circle cx="200" cy="120" r="130" fill="url(#glow2b)"/>

  <!-- gas leak cloud + glow behind sensor -->
  <circle cx="118" cy="150" r="46" fill="url(#dangerGlow2b)"/>
  <g fill="#e5e7eb" opacity="0.55">
    <circle cx="96" cy="142" r="10"/>
    <circle cx="110" cy="134" r="13"/>
    <circle cx="126" cy="140" r="11"/>
    <circle cx="112" cy="150" r="9"/>
  </g>

  <!-- MQ-series gas sensor module -->
  <rect x="86" y="158" width="64" height="54" rx="6" fill="url(#moduleGrad2b)" stroke="#ede9fe" stroke-width="2"/>
  <circle cx="118" cy="180" r="20" fill="#1e1530"/>
  <circle cx="118" cy="180" r="13" fill="#352151" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="118" cy="180" r="4" fill="#c4b5fd"/>
  <text x="118" y="206" text-anchor="middle" font-family="monospace" font-size="8" fill="#ede9fe">MQ-2</text>
  <!-- pins -->
  <line x1="96" y1="212" x2="96" y2="222" stroke="#ede9fe" stroke-width="2"/>
  <line x1="108" y1="212" x2="108" y2="222" stroke="#ede9fe" stroke-width="2"/>
  <line x1="128" y1="212" x2="128" y2="222" stroke="#ede9fe" stroke-width="2"/>
  <line x1="140" y1="212" x2="140" y2="222" stroke="#ede9fe" stroke-width="2"/>

  <!-- wires to arduino -->
  <path d="M 150 168 L 196 150" stroke="#fbbf24" stroke-width="2" fill="none"/>
  <path d="M 150 184 L 196 168" stroke="#34d399" stroke-width="2" fill="none"/>
  <path d="M 150 200 L 196 186" stroke="#67e8f9" stroke-width="2" fill="none"/>

  <!-- Arduino Uno board -->
  <rect x="196" y="130" width="78" height="66" rx="6" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
  <text x="235" y="153" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">ARDUINO</text>
  <text x="235" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">UNO</text>
  <circle cx="208" cy="180" r="3" fill="#34d399"/>
  <circle cx="218" cy="180" r="3" fill="#fbbf24"/>
  <circle cx="228" cy="180" r="3" fill="#fb7185"/>
  <rect x="252" y="172" width="14" height="16" rx="2" fill="#352151" stroke="#c4b5fd" stroke-width="1"/>

  <!-- buzzer / alarm indicator above arduino -->
  <circle cx="235" cy="118" r="9" fill="none" stroke="#fb7185" stroke-width="2"/>
  <circle cx="235" cy="118" r="4" fill="#fb7185"/>
  <path d="M 220 110 Q 235 98 250 110" stroke="#fb7185" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- MATLAB GUI monitor panel -->
  <rect x="290" y="58" width="100" height="150" rx="8" fill="#0f0a1a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="300" y="70" width="80" height="14" rx="3" fill="#2a1b45"/>
  <circle cx="308" cy="77" r="2.2" fill="#fb7185"/>
  <circle cx="315" cy="77" r="2.2" fill="#fbbf24"/>
  <circle cx="322" cy="77" r="2.2" fill="#34d399"/>

  <!-- gauge style readout -->
  <circle cx="340" cy="120" r="28" fill="none" stroke="#3a2a5c" stroke-width="6"/>
  <path d="M 340 92 A 28 28 0 1 1 316 134" fill="none" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
  <text x="340" y="124" text-anchor="middle" font-family="monospace" font-size="11" fill="#fecdd3">PPM</text>

  <!-- bar level + status -->
  <rect x="300" y="156" width="80" height="10" rx="3" fill="#2a1b45"/>
  <rect x="300" y="156" width="56" height="10" rx="3" fill="#fb7185"/>
  <rect x="300" y="174" width="80" height="20" rx="4" fill="#2a1b45"/>
  <text x="340" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#fecdd3">GAS TERDETEKSI</text>
</svg>
