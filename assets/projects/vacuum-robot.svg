<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1530"/>
      <stop offset="100%" stop-color="#2a1b45"/>
    </linearGradient>
    <linearGradient id="bodyGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="url(#bgGrad1)"/>
  <circle cx="200" cy="140" r="120" fill="url(#glow1)"/>

  <!-- floor line -->
  <line x1="0" y1="220" x2="400" y2="220" stroke="#3a2a5c" stroke-width="1.5" stroke-dasharray="6 8"/>

  <!-- obstacle box -->
  <rect x="300" y="180" width="40" height="40" rx="4" fill="#352151" stroke="#5b3fa0" stroke-width="1.5"/>

  <!-- ultrasonic sensor waves -->
  <g stroke="#c4b5fd" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 230 165 Q 260 150 280 165"/>
    <path d="M 222 172 Q 260 145 298 172"/>
    <path d="M 214 180 Q 260 138 316 180"/>
  </g>

  <!-- robot body (top-down round vacuum) -->
  <ellipse cx="170" cy="190" rx="58" ry="34" fill="#140d22" opacity="0.5"/>
  <circle cx="170" cy="178" r="58" fill="url(#bodyGrad1)" stroke="#ede9fe" stroke-width="2"/>
  <circle cx="170" cy="178" r="58" fill="none" stroke="#581c87" stroke-width="1" opacity="0.4"/>

  <!-- top panel detail -->
  <circle cx="170" cy="178" r="38" fill="#1e1530" opacity="0.25"/>
  <circle cx="170" cy="178" r="14" fill="#ede9fe"/>
  <circle cx="170" cy="178" r="6" fill="#7c3aed"/>

  <!-- ultrasonic sensor module -->
  <rect x="206" y="168" width="20" height="20" rx="3" fill="#ede9fe" stroke="#5b21b6" stroke-width="1.5"/>
  <circle cx="212" cy="178" r="3" fill="#5b21b6"/>
  <circle cx="220" cy="178" r="3" fill="#5b21b6"/>

  <!-- status LED -->
  <circle cx="170" cy="150" r="3" fill="#34d399"/>

  <!-- arduino chip label -->
  <g transform="translate(60,40)">
    <rect width="74" height="40" rx="6" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="37" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#c4b5fd">ARDUINO</text>
  </g>
</svg>
