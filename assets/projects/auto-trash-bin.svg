<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1530"/>
      <stop offset="100%" stop-color="#2a1b45"/>
    </linearGradient>
    <linearGradient id="binGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="url(#bgGrad4)"/>
  <circle cx="200" cy="120" r="130" fill="url(#glow4)"/>
  <line x1="0" y1="225" x2="400" y2="225" stroke="#3a2a5c" stroke-width="1.5" stroke-dasharray="6 8"/>

  <!-- bin body -->
  <path d="M 130 130 L 145 220 Q 146 228 154 228 L 226 228 Q 234 228 235 220 L 250 130 Z"
        fill="url(#binGrad4)" stroke="#ede9fe" stroke-width="2" stroke-linejoin="round"/>
  <line x1="160" y1="150" x2="168" y2="218" stroke="#4c1d95" stroke-width="2" opacity="0.5"/>
  <line x1="190" y1="150" x2="190" y2="220" stroke="#4c1d95" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="150" x2="212" y2="218" stroke="#4c1d95" stroke-width="2" opacity="0.5"/>

  <!-- open lid (hinged, tilted up) -->
  <g transform="rotate(-35 134 128)">
    <rect x="116" y="112" width="138" height="18" rx="6" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  </g>

  <!-- hinge -->
  <circle cx="134" cy="128" r="5" fill="#1e1530" stroke="#ede9fe" stroke-width="1.5"/>
  <circle cx="246" cy="128" r="5" fill="#1e1530" stroke="#ede9fe" stroke-width="1.5"/>

  <!-- ultrasonic sensor on lid underside -->
  <rect x="170" y="95" width="22" height="14" rx="2" fill="#1e1530" stroke="#c4b5fd" stroke-width="1.2" transform="rotate(-35 134 128)"/>

  <!-- detection waves -->
  <g stroke="#67e8f9" stroke-width="2" fill="none" opacity="0.75">
    <path d="M 95 175 Q 130 160 165 175"/>
    <path d="M 80 188 Q 130 165 180 188"/>
    <path d="M 65 202 Q 130 170 195 202"/>
  </g>

  <!-- hand approaching -->
  <g transform="translate(20,150)">
    <ellipse cx="30" cy="30" rx="20" ry="13" fill="#fcd9b8"/>
    <rect x="5" y="22" width="20" height="16" rx="8" fill="#fcd9b8"/>
  </g>

  <!-- arduino + servo label -->
  <g transform="translate(280,60)">
    <rect width="86" height="40" rx="6" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="43" y="18" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">ARDUINO</text>
    <text x="43" y="32" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">+ SERVO</text>
  </g>
</svg>
